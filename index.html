<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manhaji Salaf Platform</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#000000" />
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              // Poll for updates every 60 seconds so long-lived tabs pick up
              // new deploys without requiring a full manual refresh.
              setInterval(() => reg.update(), 60000);
            })
            .catch((err) => console.warn('SW registration failed:', err));
        });

        // When a new service worker takes control (after an update),
        // reload ONCE so the user gets the latest build.
        // We guard with sessionStorage (survives soft-reloads but not tab
        // close) to prevent infinite reload loops if the SW keeps cycling.
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (sessionStorage.getItem('sw-reloading')) return;
          sessionStorage.setItem('sw-reloading', '1');
          window.location.reload();
        });

        // Clear the reload guard after the page has fully loaded so the
        // next genuine update can trigger a reload normally.
        window.addEventListener('load', () => {
          sessionStorage.removeItem('sw-reloading');
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
