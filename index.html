<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" content="#1b5e20" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Salaf - Listen to authentic Islamic audio content, Islamic teachings, and Quranic recitations. Stream high-quality Islamic education and guidance anytime, anywhere." />
    <meta name="keywords" content="Islamic audio, Quranic recitation, Islamic teachings, Islamic education, Islamic content, Islamic streaming" />
    <meta name="author" content="Salaf" />
    <meta name="copyright" content="Salaf 2024" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://salaf.com/" />
    <meta property="og:title" content="Salaf - Islamic Audio Streaming Platform" />
    <meta property="og:description" content="Listen to authentic Islamic audio content, teachings, and Quranic recitations on Salaf." />
    <meta property="og:image" content="/salaf-logo.png" />
    <meta property="og:site_name" content="Salaf" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Salaf - Islamic Audio Streaming" />
    <meta name="twitter:description" content="Listen to authentic Islamic audio content and teachings." />
    <meta name="twitter:image" content="/salaf-logo.png" />
    
    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Salaf" />
    <meta name="format-detection" content="telephone=no" />
    
    <title>Salaf - Islamic Audio Streaming</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="any" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/icons/apple-touch-icon.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://salaf.com/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker Registration with better error handling
      if ('serviceWorker' in navigator && 'caches' in window) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('[PWA] Service Worker registered successfully:', reg);
            })
            .catch(err => {
              console.error('[PWA] Service Worker registration failed:', err);
            });
        });
      }
      
      // Detect beforeinstallprompt for debugging
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('[PWA] beforeinstallprompt event fired - App is installable');
        e.preventDefault();
      });
      
      window.addEventListener('appinstalled', () => {
        console.log('[PWA] App installed');
      });
    </script>
  </body>
</html>
